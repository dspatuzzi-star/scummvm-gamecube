name: Build GameCube DOL

"on":
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-gamecube-profile-a:
    name: Build GameCube Profile A conservative
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build GameCube DOL in devkitPro Docker
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          rm -rf logs artifact
          mkdir -p logs artifact
          docker pull devkitpro/devkitppc:latest 2>&1 | tee logs/01-docker-pull.log
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            devkitpro/devkitppc:latest \
            bash -lc '
              set -euxo pipefail
              export DEVKITPRO=/opt/devkitpro
              export DEVKITPPC=/opt/devkitpro/devkitPPC
              which powerpc-eabi-gcc || true
              which powerpc-eabi-g++ || true
              which elf2dol || true
              ./configure --help > logs/configure-help.txt || true
              ./configure \
                --host=gamecube \
                --disable-all-engines \
                --enable-engine=scumm \
                --enable-engine=gob \
                --enable-engine=groovie \
                --enable-engine=sci \
                --enable-engine=agi \
                --enable-engine=saga \
                --enable-engine=sky \
                --enable-engine=tinsel \
                --enable-engine=sword1 \
                --enable-engine=sword2 \
                --disable-debug \
                --enable-release
              make -j2
              make wiidist
            ' 2>&1 | tee logs/02-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "$BUILD_EXIT" > logs/build-exit-code.txt
          find . -maxdepth 6 -type f \( -name '*.dol' -o -name '*.elf' -o -name 'config.log' -o -name 'config.mk' \) -print > logs/found-files.txt || true
          if [ -f wiidist/scummvm/scummvm.dol ]; then cp wiidist/scummvm/scummvm.dol artifact/scummvm.dol; fi
          if [ -f scummvm.dol ]; then cp scummvm.dol artifact/scummvm.dol; fi
          if [ -f config.log ]; then cp config.log logs/config.log; fi
          if [ -f config.mk ]; then cp config.mk logs/config.mk.txt; fi
          exit 0

      - name: Upload diagnostic report
        uses: actions/upload-artifact@v4
        with:
          name: gamecube-build-diagnostics
          path: logs/
          if-no-files-found: warn

      - name: Upload GameCube DOL artifact if built
        if: hashFiles('artifact/scummvm.dol') != ''
        uses: actions/upload-artifact@v4
        with:
          name: scummvm-gamecube-profile-a-dol
          path: artifact/scummvm.dol
          if-no-files-found: error

      - name: Finish
        run: |
          if [ -f artifact/scummvm.dol ]; then echo "DOL built successfully"; else echo "No DOL yet; diagnostics artifact uploaded"; fi
