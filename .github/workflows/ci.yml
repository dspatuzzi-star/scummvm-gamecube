name: Build GameCube DOL

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-gamecube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull devkitPro container
        run: docker pull devkitpro/devkitppc:2021-08-06

      - name: Build GameCube DOL
        run: |
          cat > gamecube-build.sh <<'EOF'
          set -euo pipefail
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=/opt/devkitpro/devkitPPC
          export PATH="$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH"

          ./configure \
            --host=gamecube \
            --disable-all-engines \
            --enable-engine=scumm \
            --enable-engine=gob \
            --enable-engine=groovie \
            --enable-engine=sci \
            --enable-engine=agi \
            --enable-engine=saga \
            --enable-engine=sky \
            --enable-engine=tinsel \
            --enable-engine=sword1 \
            --enable-engine=sword2 \
            --enable-static \
            --disable-debug \
            --enable-release

          make -j2
          make wiidist
          test -f wiidist/scummvm/scummvm.dol
          EOF

          chmod +x gamecube-build.sh
          : > gamecube-build.log
          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            devkitpro/devkitppc:2021-08-06 \
            /bin/bash /workspace/gamecube-build.sh 2>&1 | tee gamecube-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          ls -lah
          pwd
          cat gamecube-build.log || true

          exit ${BUILD_EXIT}

      - name: Upload GameCube DOL artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scummvm-gamecube-profile-a-dol
          path: wiidist/scummvm/scummvm.dol

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamecube-build-logs
          path: gamecube-build.log
