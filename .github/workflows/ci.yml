name: Build GameCube DOL

"on":
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-gamecube-profile-a:
    name: Build GameCube Profile A
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Profile A DOL in devkitPro Docker
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            devkitpro/devkitppc:latest \
            bash -lc 'export DEVKITPRO=/opt/devkitpro DEVKITPPC=/opt/devkitpro/devkitPPC; echo DEVKITPRO=$DEVKITPRO; echo DEVKITPPC=$DEVKITPPC; which powerpc-eabi-gcc; which elf2dol || true; chmod +x build-gamecube-profile-a.sh; ./build-gamecube-profile-a.sh'

      - name: Verify output
        run: |
          test -f wiidist/scummvm/scummvm.dol
          ls -lh wiidist/scummvm/scummvm.dol

      - name: Upload GameCube DOL artifact
        uses: actions/upload-artifact@v4
        with:
          name: scummvm-gamecube-profile-a-dol
          path: wiidist/scummvm/scummvm.dol
          if-no-files-found: error
