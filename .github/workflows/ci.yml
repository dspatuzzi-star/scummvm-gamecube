name: Build GameCube DOL

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-gamecube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build GameCube in Docker
        id: build
        run: |
          set +e
          mkdir -p "$GITHUB_WORKSPACE/logs"
          LOG_FILE="$GITHUB_WORKSPACE/logs/gamecube-build.log"
          : > "$LOG_FILE"

          {
            echo "=== Build started: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
            ./ci/gamecube-build-docker.sh "$GITHUB_WORKSPACE" "$LOG_FILE"
          } 2>&1 | tee -a "$LOG_FILE"

          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build_exit=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [ -f "$GITHUB_WORKSPACE/wiidist/scummvm/scummvm.dol" ]; then
            echo "dol_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "dol_built=false" >> "$GITHUB_OUTPUT"
          fi

          ls -lah "$GITHUB_WORKSPACE" || true
          ls -lah "$GITHUB_WORKSPACE/logs" || true
          pwd || true
          cat "$LOG_FILE" || true
          exit 0

      - name: Ensure log exists
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/logs"
          LOG_FILE="$GITHUB_WORKSPACE/logs/gamecube-build.log"
          if [ ! -f "$LOG_FILE" ]; then
            echo "Log file missing; build step likely failed before logger init." > "$LOG_FILE"
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gamecube-build-logs
          path: ${{ github.workspace }}/logs/gamecube-build.log
          if-no-files-found: error

      - name: Upload GameCube DOL artifact
        if: always() && steps.build.outputs.dol_built == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: scummvm-gamecube-profile-a-dol
          path: ${{ github.workspace }}/wiidist/scummvm/scummvm.dol
          if-no-files-found: error

      - name: Fail job if build failed
        if: always() && steps.build.outputs.build_exit != '0'
        run: |
          echo "Container build failed with exit code ${{ steps.build.outputs.build_exit }}"
          exit 1
