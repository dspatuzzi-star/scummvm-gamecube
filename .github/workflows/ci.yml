name: Build GameCube DOL

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-gamecube-profile-a:
    name: Build GameCube Profile A
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install devkitPro package manager
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates xz-utils make git build-essential pkg-config
          wget -O /tmp/devkitpro-pacman.deb https://apt.devkitpro.org/devkitpro-pacman.amd64.deb
          sudo dpkg -i /tmp/devkitpro-pacman.deb

      - name: Install GameCube toolchain
        run: |
          sudo dkp-pacman -Sy --noconfirm gamecube-dev

      - name: Build Profile A DOL
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITPPC: /opt/devkitpro/devkitPPC
        run: |
          chmod +x build-gamecube-profile-a.sh
          ./build-gamecube-profile-a.sh

      - name: Upload GameCube DOL artifact
        uses: actions/upload-artifact@v4
        with:
          name: scummvm-gamecube-profile-a-dol
          path: wiidist/scummvm/scummvm.dol
          if-no-files-found: error
