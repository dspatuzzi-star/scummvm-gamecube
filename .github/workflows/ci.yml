name: Build GameCube DOL

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-gamecube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Initialize build log
        run: |
          : > "$GITHUB_WORKSPACE/gamecube-build.log"
          echo "Log initialized at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_WORKSPACE/gamecube-build.log"

      - name: Build GameCube in Docker
        id: build
        run: |
          set +e
          ./ci/gamecube-build-docker.sh "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/gamecube-build.log" 2>&1 | tee -a "$GITHUB_WORKSPACE/gamecube-build.log"
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build_exit=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [ -f "$GITHUB_WORKSPACE/wiidist/scummvm/scummvm.dol" ]; then
            echo "dol_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "dol_built=false" >> "$GITHUB_OUTPUT"
          fi
          ls -lah "$GITHUB_WORKSPACE"
          pwd
          cat "$GITHUB_WORKSPACE/gamecube-build.log" || true
          exit 0

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gamecube-build-logs
          path: ${{ github.workspace }}/gamecube-build.log
          if-no-files-found: error

      - name: Upload GameCube DOL artifact
        if: always() && steps.build.outputs.dol_built == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: scummvm-gamecube-profile-a-dol
          path: ${{ github.workspace }}/wiidist/scummvm/scummvm.dol
          if-no-files-found: error

      - name: Fail job if build failed
        if: always() && steps.build.outputs.build_exit != '0'
        run: |
          echo "Container build failed with exit code ${{ steps.build.outputs.build_exit }}"
          exit 1
