name: Build GameCube DOL

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-gamecube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull devkitPro container
        run: docker pull devkitpro/devkitppc:2021-08-06

      - name: Build GameCube static DOL
        run: |
          set -o pipefail
          touch gamecube-build.log
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            devkitpro/devkitppc:2021-08-06 \
            bash -lc '
              set -euo pipefail
              export DEVKITPRO=/opt/devkitpro
              export DEVKITPPC=/opt/devkitpro/devkitPPC
              export PATH="$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH"

              echo "== Toolchain =="
              which powerpc-eabi-g++
              powerpc-eabi-g++ --version

              echo "== Configure static GameCube build =="
              ./configure \
                --host=gamecube \
                --disable-all-engines \
                --enable-engine-static=scumm,gob,groovie,sci,agi,saga,sky,tinsel,sword1,sword2 \
                --enable-static \
                --disable-debug \
                --enable-release

              echo "== Build =="
              make -j2

              echo "== Package Wii/GameCube dist =="
              make wiidist

              echo "== Verify DOL =="
              test -f wiidist/scummvm/scummvm.dol
              ls -lh wiidist/scummvm/scummvm.dol
            ' 2>&1 | tee gamecube-build.log

      - name: Upload GameCube DOL artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scummvm-gamecube-static-dol
          path: wiidist/scummvm/scummvm.dol

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamecube-build-logs
          path: gamecube-build.log
          if-no-files-found: warn
